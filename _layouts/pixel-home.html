---
layout: default
---

{% include base_path %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

#pixel-game-wrapper {
  display: none;
  width: 100%;
  max-width: 960px;
  margin: 24px auto;
  padding: 0 16px;
  box-sizing: border-box;
}

#pixel-game-container {
  width: 100%;
  aspect-ratio: 640 / 360;
  background: #1a1a2e;
  border: 4px solid #5b6ee1;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(91, 110, 225, 0.25);
}

#pixel-game-container canvas {
  image-rendering: pixelated !important;
  image-rendering: crisp-edges !important;
  -ms-interpolation-mode: nearest-neighbor;
}

#pixel-mobile-fallback {
  max-width: 600px;
  margin: 24px auto;
  padding: 0 16px;
}

.pixel-mobile-title {
  font-family: "Press Start 2P", monospace;
  font-size: 14px;
  color: #5b6ee1;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.6;
}

.pixel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.pixel-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1a1a2e;
  border: 3px solid #5b6ee1;
  border-radius: 4px;
  color: #fff;
  font-family: "Press Start 2P", monospace;
  text-decoration: none;
  padding: 20px 12px;
  text-align: center;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  cursor: pointer;
}

.pixel-card:hover,
.pixel-card:focus {
  transform: scale(1.04);
  border-color: #ffd700;
  box-shadow: 0 2px 16px rgba(255, 215, 0, 0.3);
  color: #fff;
  text-decoration: none;
}

.pixel-card:active {
  transform: scale(0.97);
}

.pixel-emoji {
  font-size: 28px;
  margin-bottom: 10px;
  line-height: 1;
}

.pixel-card span:last-child {
  font-size: 9px;
  color: #ccc;
  line-height: 1.4;
}

.pixel-home-content {
  max-width: 720px;
  margin: 32px auto 0;
  padding: 0 16px;
}
</style>

<div id="main" role="main">
  <article class="splash" itemscope itemtype="http://schema.org/CreativeWork">
    {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}

    <!-- Pixel Art Game (Desktop) -->
    <div id="pixel-game-wrapper">
      <div id="pixel-game-container"></div>
    </div>

    <!-- Navigation Fallback (Mobile & No-JS) -->
    <div id="pixel-mobile-fallback">
      <h2 class="pixel-mobile-title">Explore My Site</h2>
      <div class="pixel-grid">
        <a href="{{ base_path }}/publications/" class="pixel-card">
          <span class="pixel-emoji">📚</span>
          <span>Publications</span>
        </a>
        <a href="{{ base_path }}/talks/" class="pixel-card">
          <span class="pixel-emoji">🎤</span>
          <span>Talks</span>
        </a>
        <a href="{{ base_path }}/teaching/" class="pixel-card">
          <span class="pixel-emoji">🎓</span>
          <span>Teaching</span>
        </a>
        <a href="{{ base_path }}/portfolio/" class="pixel-card">
          <span class="pixel-emoji">🎨</span>
          <span>Portfolio</span>
        </a>
        <a href="{{ base_path }}/year-archive/" class="pixel-card">
          <span class="pixel-emoji">✍️</span>
          <span>Blog</span>
        </a>
        <a href="{{ base_path }}/cv/" class="pixel-card">
          <span class="pixel-emoji">📄</span>
          <span>CV</span>
        </a>
      </div>
    </div>

    <!-- Page Content -->
    <section class="page__content" itemprop="text">
      <div class="pixel-home-content">
        {{ content }}
      </div>
    </section>

  </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="{{ base_path }}/assets/js/pixel-game.js"></script>
